<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PocketStudy Support</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d3440;
      --panel: rgba(255, 255, 255, 0.92);
      --line: rgba(217, 205, 187, 0.9);
      --accent: #a5632b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(165, 99, 43, 0.12), transparent 30%),
        linear-gradient(180deg, #f8f3ea 0%, #f1e7d8 100%);
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .hero,
    .card {
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 20px 48px rgba(29, 52, 64, 0.08);
    }

    .hero {
      padding: 30px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, rgba(27, 51, 64, 0.95), rgba(165, 99, 43, 0.88));
      color: #fff;
      border: none;
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.82;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 6vw, 52px);
      line-height: 1.05;
    }

    p {
      line-height: 1.75;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .link {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">PocketStudy</p>
      <h1>研夹 / PocketStudy</h1>
      <p>完全离线的学习资料整理与复习支持站点。这里提供 App Store 所需的支持页面与隐私政策，也方便用户快速找到联系方式与常见问题。</p>
    </section>

    <section class="grid">
      <a class="card" href="/pocketstudy/support/">
        <h2>帮助与支持</h2>
        <p>查看常见问题、权限说明、OCR 与扫描建议，以及支持联系方式。</p>
        <p class="link">打开支持页</p>
      </a>

      <a class="card" href="/pocketstudy/privacy/">
        <h2>隐私政策</h2>
        <p>查看 PocketStudy 如何在完全离线模式下处理资料、通知与学习记录。</p>
        <p class="link">打开隐私政策</p>
      </a>
    </section>
  </main>
</body>
</html>
